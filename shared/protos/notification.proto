syntax = "proto3";

package notification;

import "google/protobuf/timestamp.proto";

service NotificationService {
  rpc CreateNotification (CreateNotificationRequest) returns (CreateNotificationResponse);
  rpc ListNotifications (ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkAsRead (MarkAsReadRequest) returns (MarkAsReadResponse);
  rpc MarkAllAsRead (MarkAllAsReadRequest) returns (MarkAllAsReadResponse);
  rpc GetUnreadCount (GetUnreadCountRequest) returns (GetUnreadCountResponse);
  rpc CreateBulkNotifications (CreateBulkNotificationsRequest) returns (CreateBulkNotificationsResponse);
}

enum NotificationStatus {
  NOTIFICATION_STATUS_UNSPECIFIED = 0;
  UNREAD = 1;
  READ = 2;
}

enum NotificationPriority {
  NOTIFICATION_PRIORITY_UNSPECIFIED = 0;
  LOW = 1;
  NORMAL = 2;
  HIGH = 3;
}

message Notification {
  string id = 1;
  string recipient_id = 2;
  string type = 3;
  string title = 4;
  string body = 5;
  string payload_json = 6;
  NotificationStatus status = 7;
  NotificationPriority priority = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp read_at = 10;
}

message CreateNotificationRequest {
  string recipient_id = 1;
  string type = 2;
  string title = 3;
  string body = 4;
  string payload_json = 5;
  NotificationPriority priority = 6;
  string dedup_key = 7;
}

message CreateNotificationResponse {
  Notification notification = 1;
}

message ListNotificationsRequest {
  string recipient_id = 1;
  NotificationStatus status = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListNotificationsResponse {
  repeated Notification notifications = 1;
  string next_page_token = 2;
}

message MarkAsReadRequest {
  string notification_id = 1;
}

message MarkAsReadResponse {
  Notification notification = 1;
}

message MarkAllAsReadRequest {
  string recipient_id = 1;
}

message MarkAllAsReadResponse {
  int32 updated_count = 1;
}

message GetUnreadCountRequest {
  string recipient_id = 1;
}

message GetUnreadCountResponse {
  int32 unread_count = 1;
}

message CreateBulkNotificationsRequest {
  repeated CreateNotificationRequest requests = 1;
}

message CreateBulkNotificationsResponse {
  repeated Notification notifications = 1;
}
